services:
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    command: start-dev --import-realm
    environment:
      KEYCLOAK_IMPORT: /opt/keycloak/data/import/specmatic-realm.json
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8083:8080"

  order-api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/specmatic
    ports:
      - "8080:8080"
    restart: on-failure

  specmatic-test:
    image: specmatic/enterprise:latest
    depends_on:
      order-api:
        condition: service_started
    working_dir: /usr/src/app
    environment:
      APP_BASE_URL: http://order-api:8080
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_USER_USERNAME: user1
      KEYCLOAK_USER_PASSWORD: password
      KEYCLOAK_ADMIN_USERNAME: admin1
      KEYCLOAK_ADMIN_PASSWORD: password
    volumes:
      - .:/usr/src/app
    entrypoint: ["/bin/bash"]
    command:
      - -ec
      - |
        set -euo pipefail

        bash scripts/wait_for_http.sh \
          "http://keycloak:8080/realms/specmatic/.well-known/openid-configuration" \
          "Keycloak" \
          90 \
          2
        bash scripts/wait_for_http.sh \
          "http://order-api:8080/actuator/mappings" \
          "Order API" \
          90 \
          2 \
          "200,401"
        specmatic test
