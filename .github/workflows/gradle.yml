name: Java CI with Gradle

run-name: ${{ inputs.orchestrator_run_suffix && format('Java CI with Gradle - {0}', inputs.orchestrator_run_suffix) || github.workflow }}
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: contracts changed
  workflow_dispatch:
    inputs:
      enterprise_version:
        description: Specmatic Enterprise version under test
        required: false
        type: string
      enterprise_artifact_url:
        description: Specmatic Enterprise jar/artifact URL under test
        required: false
        type: string
      orchestrator_run_suffix:
        description: Test orchestrator run suffix
        required: false
        type: string

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        java: [17]
    runs-on: ${{ matrix.os }}
    env:
      ENTERPRISE_VERSION: ${{ inputs.enterprise_version }}
      ENTERPRISE_ARTIFACT_URL: ${{ inputs.enterprise_artifact_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add orchestrator context to summary
        if: ${{ inputs.orchestrator_run_suffix != '' }}
        run: |
          echo "### Orchestrator" >> "$GITHUB_STEP_SUMMARY"
          echo "Run: ${{ inputs.orchestrator_run_suffix }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Save Specmatic license
        run: |
          mkdir -p ~/.specmatic
          echo "${{ secrets.SPECMATIC_LICENSE_KEY }}" > ~/.specmatic/specmatic-license.txt

      - name: Prepare Specmatic Enterprise artifact
        if: ${{ inputs.enterprise_artifact_url != '' && inputs.enterprise_version != '' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.specmatic
          url="${ENTERPRISE_ARTIFACT_URL}"
          output_path="$HOME/.specmatic/specmatic-enterprise.jar"
          max_attempts=10

          echo "Downloading Enterprise artifact from:"
          echo "$url"

          initial_sleep=$(( RANDOM % 181 ))
          echo "Initial jitter: ${initial_sleep}s"
          sleep "$initial_sleep"

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Download attempt ${attempt}/${max_attempts}"

            if curl --http1.1 -L --fail --continue-at - "$url" -o "$output_path"; then
              echo "Enterprise artifact downloaded successfully"
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Download failed after ${max_attempts} attempts"
              exit 1
            fi

            backoff=$(( 30 * attempt ))
            jitter=$(( RANDOM % 31 ))
            sleep_for=$(( backoff + jitter ))
            echo "Attempt ${attempt} failed. Sleeping ${sleep_for}s before retry"
            sleep "$sleep_for"
          done

          mvn install:install-file \
            -Dfile="$HOME/.specmatic/specmatic-enterprise.jar" \
            -DgroupId=io.specmatic.enterprise \
            -DartifactId=executable \
            -Dversion="${ENTERPRISE_VERSION}" \
            -Dpackaging=jar \
            -DgeneratePom=true

      - name: Build with Gradle
        run: |
          ./gradlew --no-daemon clean test bootJar jacocoTestReport \
            ${ENTERPRISE_VERSION:+-PspecmaticEnterpriseVersion=${ENTERPRISE_VERSION}} \
            ${ENTERPRISE_VERSION:+-PenterpriseVersion=${ENTERPRISE_VERSION}}

      - name: Run Specmatic Insights Build Reporter
        run: |
          docker run \
            --rm \
            -e GIT_DISCOVERY_ACROSS_FILESYSTEM=1 \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/usr/src/app \
            -v "${HOME}/.specmatic:/root/.specmatic:ro" \
            -v "${{ github.workspace }}:/usr/src/app" \
            -w /usr/src/app \
            specmatic/enterprise \
            send-report \
            --metadata build_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --branch-name ${{ github.ref_name }} \
            --repo-name ${{ github.event.repository.name }} \
            --repo-id ${{ github.repository_id }} \
            --repo-url ${{ github.event.repository.html_url }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: jacoco coverage report
          path: build/reports/jacoco/test/html

      - name: Upload CTRF Test Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ctrf-report
          path: build/reports/specmatic/test/ctrf/*.json
          retention-days: 5

      - name: Upload target jar for Docker
        uses: actions/upload-artifact@v6
        with:
          name: jar
          path: build/libs/*.jar

  docker:
    if: ${{ github.ref == 'refs/heads/main' && inputs.orchestrator_run_suffix == '' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download target jar from build job
        uses: actions/download-artifact@v7
        with:
          name: jar
          path: build/libs/

      - name: List files in target directory
        run: ls -lah ./build/libs/specmatic-order-api-java-with-oauth.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        run: echo ${{ secrets.SPECMATIC_DOCKER_HUB_TOKEN }} | docker login -u ${{ vars.SPECMATIC_DOCKER_HUB_USERNAME }} --password-stdin

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: specmaticdemo/${{ github.event.repository.name }}

      - name: Build and push Docker image (multi-platform)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            specmaticdemo/${{ github.event.repository.name }}:latest
          labels: ${{ steps.meta.outputs.labels }}
